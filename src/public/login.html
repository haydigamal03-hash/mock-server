<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRON Dashboard - MILD Security Framework</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #00ff00;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-box {
      border: 2px solid #00ff00;
      border-radius: 10px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.8);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }

    .header p {
      font-size: 12px;
      color: #00aa00;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #00ff00;
      background: rgba(0, 255, 0, 0.1);
      color: #00ff00;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }

    .form-group input::placeholder {
      color: #00aa00;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #00ff00;
      color: #000;
      border: none;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #00dd00;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
    }

    .alert {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 5px;
      font-size: 12px;
      display: none;
    }

    .alert.error {
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid #ff0000;
      color: #ff6666;
    }

    .alert.success {
      background: rgba(0, 255, 0, 0.2);
      border: 1px solid #00ff00;
      color: #66ff66;
    }

    .security-info {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #00ff00;
      font-size: 10px;
      color: #00aa00;
    }

    .security-info h3 {
      margin-bottom: 10px;
      color: #00ff00;
    }

    .security-info ul {
      list-style: none;
      padding-left: 0;
    }

    .security-info li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="header">
        <h1>TRON DASHBOARD</h1>
        <p>MILD Security Framework v1.0</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="btn">Login</button>
      </form>

      <div class="security-info">
        <h3>MILD Framework Active</h3>
        <ul>
          <li>7-Layer Security</li>
          <li>Real-time Threat Detection</li>
          <li>Adaptive Response</li>
          <li>AES-256-GCM Encryption</li>
          <li>Rate Limiting</li>
          <li>Session Protection</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const alertDiv = document.getElementById('alert');

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          alertDiv.className = 'alert success';
          alertDiv.textContent = 'Login successful. Redirecting...';
          alertDiv.style.display = 'block';
          setTimeout(() => {
            window.location.href = username === 'admin' ? '/admin/dashboard' : '/user/dashboard';
          }, 1500);
        } else {
          alertDiv.className = 'alert error';
          alertDiv.textContent = (data.error || 'Login failed');
          alertDiv.style.display = 'block';
        }
      } catch (error) {
        alertDiv.className = 'alert error';
        alertDiv.textContent = 'Network error: ' + error.message;
        alertDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
